services:
  - type: web
    name: fiber-license-api
    env: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: LICENSE_APP_SECRET
        sync: false
      - key: LICENSE_SIGNING_SECRET
        sync: false
      - key: LICENSE_TRIAL_DAYS
        value: "30"
